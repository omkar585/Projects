<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="stylesheet" href="./style/signup.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div class="background">
  <div id="heading">
    <h4>SIGN UP</h4>
    <h5>Create your account on Shoppers Stop</h5>
  </div>

  <div id="signup">
    <div class="inputdiv">
      <i class="fas fa-user icon"></i>
      <input type="text" placeholder="username*" class="name" id="user" required />
    </div>

    <div class="inputdiv">
      <i class="fas fa-envelope icon"></i>
      <input type="email" placeholder="Email*" required class="name" id="email" />
    </div>

    <div class="inputdiv">
      <i class="fas fa-phone-alt"></i>
      <input type="mobile" placeholder="Mobile Number(10 digits)*" required class="name" id="mobile" />
    </div>

    <div class="inputdiv">
      <i class="fas fa-lock"></i>
      <input type="password" placeholder="Set a password(min 6 & max 15 characters)*" required class="name" id="pass" />
    </div>

    <div class="gender">
      <i class="fas fa-venus-mars"></i>
      <div id="radio">
        <div id="female">
          <input type="radio" name="gender" id="women" />
          <label for="women">Female</label>
        </div>
        <div id="male">
          <input type="radio" name="gender" id="men" />
          <label for="men">Male</label>
        </div>
      </div>
    </div>
  </div>

  <p class="p" id="message"></p>

  <div id="continue">
    <button type="submit" id="btn">CONTINUE</button>
  </div>

  <div id="social">
    <div id="left"></div>
    <div id="text">Or via Social Account</div>
    <div id="rigth"></div>
  </div>

  <div id="socialAccount">
    <div id="fb">
      <a href="https://facebook.com">
        <img
          src="https://cdn.icon-icons.com/icons2/1826/PNG/512/4202107facebookfblogosocialsocialmedia-115710_115591.png"
          width="50px" />
      </a>
    </div>

    <div id="google">
      <a href="https://google.co.in">
        <img
          src="https://www.freepnglogos.com/uploads/google-logo-png/google-logo-png-webinar-optimizing-for-success-google-business-webinar-13.png"
          width="50px" /></a>
    </div>
  </div>

  <h3 class="h3">
    Have an account? <a href="./loginin.html">Sign In</a>
  </h3>

  <p class="p">
    By signing up you agree to our
    <a href="https://www.shoppersstop.com/term-condition" target="_blank">Terms of service</a>
    & <a href="https://www.shoppersstop.com/privacy">Privacy Policy</a>
  </p>
  </div>
</body>

</html>
